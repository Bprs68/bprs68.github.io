// ─── TWEAKS ──────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "amber",
  "darkMode": true,
  "fontStyle": "serif"
}/*EDITMODE-END*/;

function TweaksPanel({ onClose }) {
  const [accent, setAccent] = useState(TWEAK_DEFAULTS.accentColor);
  const [dark, setDark] = useState(TWEAK_DEFAULTS.darkMode);
  const [font, setFont] = useState(TWEAK_DEFAULTS.fontStyle);

  const accents = {
    amber: ['oklch(0.75 0.14 65)', 'oklch(0.55 0.10 65)'],
    teal:  ['oklch(0.72 0.12 195)', 'oklch(0.50 0.09 195)'],
    rose:  ['oklch(0.70 0.15 15)', 'oklch(0.50 0.10 15)'],
    sage:  ['oklch(0.70 0.10 155)', 'oklch(0.50 0.08 155)'],
  };

  const apply = (a, d, f) => {
    const [main, dim] = accents[a];
    document.documentElement.style.setProperty('--accent', main);
    document.documentElement.style.setProperty('--accent-dim', dim);
    document.documentElement.style.setProperty('--bg', d ? 'oklch(0.12 0.01 55)' : 'oklch(0.97 0.005 70)');
    document.documentElement.style.setProperty('--bg2', d ? 'oklch(0.16 0.01 55)' : 'oklch(0.93 0.005 70)');
    document.documentElement.style.setProperty('--bg3', d ? 'oklch(0.20 0.012 55)' : 'oklch(0.89 0.005 70)');
    document.documentElement.style.setProperty('--fg', d ? 'oklch(0.93 0.01 70)' : 'oklch(0.15 0.01 55)');
    document.documentElement.style.setProperty('--fg-muted', d ? 'oklch(0.65 0.01 70)' : 'oklch(0.40 0.01 55)');
    document.documentElement.style.setProperty('--fg-dim', d ? 'oklch(0.42 0.01 70)' : 'oklch(0.60 0.01 55)');
    document.documentElement.style.setProperty('--border', d ? 'oklch(0.25 0.01 55)' : 'oklch(0.82 0.005 55)');
    document.documentElement.style.setProperty('--font-serif', f === 'serif' ? "'DM Serif Display', Georgia, serif" : "'Inter', system-ui, sans-serif");
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: a, darkMode: d, fontStyle: f } }, '*');
  };

  const handleAccent = (a) => { setAccent(a); apply(a, dark, font); };
  const handleDark = (d) => { setDark(d); apply(accent, d, font); };
  const handleFont = (f) => { setFont(f); apply(accent, dark, f); };

  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9000,
      width: 260, background: 'oklch(0.18 0.01 55)',
      border: '1px solid oklch(0.28 0.01 55)',
      padding: '20px', fontFamily: 'var(--font-mono)',
      boxShadow: '0 8px 40px oklch(0 0 0 / 0.5)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <span style={{ fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--accent)' }}>Tweaks</span>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--fg-dim)', fontSize: 16 }}>×</button>
      </div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-dim)', marginBottom: 10 }}>Accent Color</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {Object.entries({ amber: '#c99040', teal: '#3ba8a0', rose: '#c05060', sage: '#5a9060' }).map(([name, hex]) => (
            <button key={name} onClick={() => handleAccent(name)} title={name} style={{
              width: 28, height: 28, borderRadius: '50%', background: hex, border: accent === name ? '2px solid white' : '2px solid transparent', cursor: 'pointer',
            }} />
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-dim)', marginBottom: 10 }}>Mode</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[['Dark', true], ['Light', false]].map(([label, val]) => (
            <button key={label} onClick={() => handleDark(val)} style={{
              flex: 1, padding: '8px', background: dark === val ? 'var(--accent)' : 'oklch(0.22 0.01 55)',
              border: 'none', cursor: 'pointer', fontSize: 11, letterSpacing: '0.08em',
              color: dark === val ? 'var(--bg)' : 'var(--fg-muted)',
            }}>{label}</button>
          ))}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--fg-dim)', marginBottom: 10 }}>Heading Style</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[['Serif', 'serif'], ['Sans', 'sans']].map(([label, val]) => (
            <button key={label} onClick={() => handleFont(val)} style={{
              flex: 1, padding: '8px', background: font === val ? 'var(--accent)' : 'oklch(0.22 0.01 55)',
              border: 'none', cursor: 'pointer', fontSize: 11, letterSpacing: '0.08em',
              color: font === val ? 'var(--bg)' : 'var(--fg-muted)',
              fontFamily: val === 'serif' ? "'DM Serif Display', Georgia, serif" : 'inherit',
            }}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const handleClose = () => {
    setTweaksOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  return (
    <>
      <style>{`
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(6px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
          .two-col { grid-template-columns: 1fr !important; gap: 40px !important; }
          .three-col { grid-template-columns: 1fr !important; }
          .hide-mobile { display: none !important; }
        }
      `}</style>
      <Nav />
      <Hero />
      <About />
      <Experience />
      <Projects />
      <Skills />
      <Contact />
      <Footer />
      {tweaksOpen && <TweaksPanel onClose={handleClose} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
